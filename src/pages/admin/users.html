<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - HANSYPIX Admin</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body class="admin-body">
    <!-- Admin Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a href="/index.html" class="admin-logo">
                <img src="../../logo.png" alt="HANSYPIX Logo" class="logo-image">
                <span>HANSYPIX</span>
            </a>
            <span class="admin-badge">Admin</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="portfolio-manager.html" class="nav-item">
                <i data-lucide="image"></i>
                <span>Portfolio</span>
            </a>
            <a href="site-settings.html" class="nav-item">
                <i data-lucide="settings"></i>
                <span>Site Settings</span>
            </a>
            <a href="users.html" class="nav-item active">
                <i data-lucide="users"></i>
                <span>Users</span>
            </a>
            <a href="messages.html" class="nav-item">
                <i data-lucide="message-circle"></i>
                <span>Messages</span>
                <span class="badge" id="unreadMessagesBadge">0</span>
            </a>
            <a href="bookings.html" class="nav-item">
                <i data-lucide="calendar"></i>
                <span>Bookings</span>
            </a>
            <a href="payments.html" class="nav-item">
                <i data-lucide="credit-card"></i>
                <span>Payments</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <a href="/index.html" class="nav-item">
                <i data-lucide="arrow-left"></i>
                <span>Back to Site</span>
            </a>
            <button class="nav-item" id="adminLogout">
                <i data-lucide="log-out"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="admin-main">
        <!-- Top Bar -->
        <header class="admin-header">
            <button class="mobile-sidebar-toggle" id="mobileSidebarToggle">
                <i data-lucide="menu"></i>
            </button>
            
            <h1 class="page-title">Users</h1>
            
            <div class="header-actions">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="userSearch" placeholder="Search users...">
                </div>
            </div>
        </header>
        
        <!-- Users Content -->
        <div class="admin-content">
            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card glass-card">
                    <div class="stat-icon blue">
                        <i data-lucide="users"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="stat-value" id="totalUsers">0</h3>
                        <p class="stat-label">Total Users</p>
                    </div>
                </div>
                
                <div class="stat-card glass-card">
                    <div class="stat-icon green">
                        <i data-lucide="user-check"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="stat-value" id="activeUsers">0</h3>
                        <p class="stat-label">Active This Month</p>
                    </div>
                </div>
                
                <div class="stat-card glass-card">
                    <div class="stat-icon purple">
                        <i data-lucide="user-plus"></i>
                    </div>
                    <div class="stat-info">
                        <h3 class="stat-value" id="newUsers">0</h3>
                        <p class="stat-label">New This Week</p>
                    </div>
                </div>
            </div>
            
            <!-- Filters -->
            <div class="content-filters glass-card">
                <div class="filter-group">
                    <label>Role</label>
                    <select id="roleFilter">
                        <option value="all">All Roles</option>
                        <option value="customer">Customers</option>
                        <option value="admin">Admins</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="sortFilter">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="name">Name (A-Z)</option>
                    </select>
                </div>
            </div>
            
            <!-- Users Table -->
            <div class="data-table glass-card">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Users will be loaded here -->
                        <tr class="loading-row">
                            <td colspan="6">
                                <div class="loading-state">
                                    <div class="spinner"></div>
                                    <p>Loading users...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <i data-lucide="users"></i>
                <h3>No users found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
        </div>
    </main>
    
    <!-- User Details Modal -->
    <div class="modal" id="userDetailsModal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3 class="modal-title">User Details</h3>
                <button class="modal-close" id="closeUserModal">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="user-details">
                <div class="user-avatar-large">
                    <i data-lucide="user"></i>
                </div>
                
                <h4 class="user-name" id="userName">-</h4>
                <p class="user-email" id="userEmail">-</p>
                
                <div class="user-info-grid">
                    <div class="info-item">
                        <label>Phone</label>
                        <span id="userPhone">-</span>
                    </div>
                    <div class="info-item">
                        <label>Role</label>
                        <span id="userRole">-</span>
                    </div>
                    <div class="info-item">
                        <label>Joined</label>
                        <span id="userJoined">-</span>
                    </div>
                    <div class="info-item">
                        <label>Total Bookings</label>
                        <span id="userBookings">0</span>
                    </div>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-secondary" id="closeUserDetailsBtn">Close</button>
                <button class="btn-primary" id="viewUserBookings">
                    <i data-lucide="calendar"></i>
                    View Bookings
                </button>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <!-- Supabase CDN - Must load first -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../../supabase/config.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/admin/auth-check.js?v=2"></script>
    <script src="../../js/admin/users.js"></script>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
